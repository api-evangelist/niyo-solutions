aid: niyo-solutions
name: Niyo Solutions
description: >-
  Niyo Solutions (brand: Niyo, goniyo.com) is a Bengaluru, India based
  consumer fintech founded in 2015 by Vinay Bagri and Virender Bisht, focused
  on international travel banking and savings for Indian retail customers.
  Niyo is not a chartered bank; it operates as a neo-banking front end layered
  on partner RBI-licensed banks — DCB Bank (current flagship for the Niyo
  zero-forex savings + debit card), SBM Bank India (previous "Niyo Global"
  forex card, now wound down for new customers and operating a secured credit
  card variant), Equitas Small Finance Bank (salary / "Niyo Bharat" account)
  and IDFC FIRST Bank (earlier Niyo Global issuer) — plus card network rails
  (Visa, RuPay). Niyo's flagship surface is the "zero forex markup" Niyo
  Global / DCB Niyo Global / SBM Niyo Global Visa debit and prepaid travel
  cards accepted in 180+ countries, paired with a digital savings account
  delivered through partner banks. The company has expanded beyond cards into
  a full travel-banking stack including currency exchange and forex cash
  delivery, outbound remittance (Send Money Abroad), international flights,
  hotels and curated experiences, Niyo Express airport services, an
  international travel eSIM, travel visa assistance, travel insurance, a
  premium subscription tier, a student program (Niyo Scholarship, NISAP) and
  a DCB Niyo Secured Credit Card backed by a fixed deposit. Niyo serves over
  one million international travellers and has raised capital from investors
  including Accel, Lightrock, Beams Fintech Fund, Tencent, Horizons Ventures,
  Prime Venture Partners and JS Capital. There is no public REST developer
  API, partner banking-as-a-service surface, SDK, MCP server, or GitHub
  organisation — Niyo is delivered exclusively as a B2C iOS and Android
  mobile application with a marketing and tools website at goniyo.com.
